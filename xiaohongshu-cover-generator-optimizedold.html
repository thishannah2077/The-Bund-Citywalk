// Fix: Fisher-Yates 无偏洗牌
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function analyzeBg(src, cb) {
  const fallback = { lum: 128, avgR: 128, avgG: 128, avgB: 128, hue: 0 };
  const im = new Image();
  if (src && !src.startsWith("data:")) im.crossOrigin = "anonymous";
  im.onload = () => {
    try {
      const c = document.createElement("canvas"); c.width = 50; c.height = 50;
      const x = c.getContext("2d"); x.drawImage(im, 0, 0, 50, 50);
      const d = x.getImageData(0, 0, 50, 50).data;
      let t = 0, r = 0, g = 0, b = 0;
      for (let i = 0; i < d.length; i += 4) {
        t += d[i] * .299 + d[i + 1] * .587 + d[i + 2] * .114;
        r += d[i]; g += d[i + 1]; b += d[i + 2];
      }
      const count = d.length / 4;
      cb({
        lum: t / count,
        avgR: r / count,
        avgG: g / count,
        avgB: b / count,
        hue: rgbToHue(r / count, g / count, b / count)
      });
    } catch (e) {
      console.warn("图片分析失败", e);
      cb(fallback);
    }
  };
  // Fix: 添加图片加载失败的错误处理
  im.onerror = () => { console.warn("背景图片加载失败，使用默认亮度值"); cb(fallback); };
  im.src = src;
}

function rgbToHue(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0;
  if (max === min) return 0;
  if (max === r) h = (g - b) / (max - min);
  else if (max === g) h = 2 + (b - r) / (max - min);
  else h = 4 + (r - g) / (max - min);
  h *= 60;
  if (h < 0) h += 360;
  return h;
}

function getRandomTemplate(imgData) {
  const { lum, hue } = imgData;
  const isDark = lum < 100;
  const isLight = lum > 180;
  const isWarm = hue >= 0 && hue < 60 || hue >= 300;
  const isCool = hue >= 120 && hue < 270;

  // Fix: 使用 category 字段过滤，避免脆弱的 id.includes() 字符串匹配
  let filtered = T.filter(tpl => !(tpl.pure && isLight));
  if (filtered.length === 0) filtered = T;

  const hasCategory = (tpl, cat) => tpl.category?.includes(cat);

  const groups = {
    dark:     filtered.filter(t => hasCategory(t, 'dark')),
    light:    filtered.filter(t => hasCategory(t, 'light')),
    warm:     filtered.filter(t => hasCategory(t, 'warm')),
    cool:     filtered.filter(t => hasCategory(t, 'cool')),
    neutral:  filtered.filter(t => hasCategory(t, 'neutral')),
    vertical: filtered.filter(t => hasCategory(t, 'vertical')),
  };

  let candidates = [];
  const rand = Math.random();

  if (rand < 0.4) {
    if (isDark && groups.dark.length > 0) candidates = groups.dark;
    else if (isLight && groups.light.length > 0) candidates = groups.light;
    else if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
  } else if (rand < 0.7) {
    if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
    else if (groups.neutral.length > 0) candidates = groups.neutral;
  } else if (rand < 0.85 && groups.vertical.length > 0) {
    candidates = groups.vertical;
  }

  if (candidates.length === 0) candidates = filtered;

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function getRandomTextColors(imgData, tpl) {
  const { lum } = imgData;
  const rand = Math.random();

  if (rand < 0.3) {
    return { tc: tpl.tc, sc: tpl.sc };
  }

  if (lum < 80) {
    const darkColors = ["#ffffff", "#FFD700", "#FF6B9D", "#00F0FF"];
    return {
      tc: darkColors[Math.floor(Math.random() * darkColors.length)],
      sc: "#ffffffaa"
    };
  } else if (lum > 200) {
    const lightColors = ["#1a1a1a", "#D4A843", "#FF4D94", "#2DBE6C", "#4a90d9"];
    return {
      tc: lightColors[Math.floor(Math.random() * lightColors.length)],
      sc: "#444444"
    };
  }

  const allColors = TEXT_COLORS.map(c => c.value);
  const shuffled = shuffleArray(allColors);
  return { tc: shuffled[0], sc: shuffled[1] || shuffled[0] };
}

  const locFont = cnFonts[Math.floor(Math.random() * cnFonts.length)];
  const descFont = cnFonts[Math.floor(Math.random() * cnFonts.length)];

function DraggableText({ id, off, children, style = {} }) {
  const onDrag = useContext(DragCtx);
  const o = off?.[id] || { x: 0, y: 0 };
  const r = useRef({ on: false, sx: 0, sy: 0, ox: 0, oy: 0 });

  const startDrag = useCallback((clientX, clientY) => {
    const d = r.current; d.on = true; d.sx = clientX; d.sy = clientY; d.ox = o.x; d.oy = o.y;
  }, [o.x, o.y]);

  const onMouseDown = useCallback(e => {
    e.stopPropagation();
    startDrag(e.clientX, e.clientY);
    const mv = ev => { if (!r.current.on) return; const d = r.current; onDrag(id, { x: Math.round(d.ox + (ev.clientX - d.sx) / SC), y: Math.round(d.oy + (ev.clientY - d.sy) / SC) }); };
    const up = () => { r.current.on = false; window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", mv); window.addEventListener("mouseup", up);
  }, [id, startDrag, onDrag]);

  const onTouchStart = useCallback(e => {
    e.stopPropagation();
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY);
    const mv = ev => { if (!r.current.on) return; const d = r.current; const t = ev.touches[0]; onDrag(id, { x: Math.round(d.ox + (t.clientX - d.sx) / SC), y: Math.round(d.oy + (t.clientY - d.sy) / SC) }); };
    const up = () => { r.current.on = false; window.removeEventListener("touchmove", mv); window.removeEventListener("touchend", up); };
    window.addEventListener("touchmove", mv, { passive: false });
    window.addEventListener("touchend", up);
  }, [id, startDrag, onDrag]);

  return <div onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ ...style, transform: `translate(${o.x}px,${o.y}px)`, cursor: "move", position: "relative", userSelect: "none", touchAction: "none" }}>{children}</div>;
}

const HANNAH_PARTICLES = ["👑","✨","💅","🌟","💫","🎀","💎","🌸"];

function HannahModal({ onClose }) {
  const [closing, setClosing] = useState(false);
  const [progress, setProgress] = useState(100);
  const [particles, setParticles] = useState([]);

  const close = useCallback(() => {
    setClosing(true);
    setTimeout(onClose, 280);
  }, [onClose]);

  // countdown
  useEffect(() => {
    const total = 4000;
    const start = Date.now();
    const timer = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / total) * 100);
      setProgress(pct);
      if (elapsed >= total) { clearInterval(timer); close(); }
    }, 50);
    return () => clearInterval(timer);
  }, [close]);

  // spawn particles
  useEffect(() => {
    const spawn = () => setParticles(prev => {
      const next = [...prev, {
        id: Date.now() + Math.random(),
        emoji: HANNAH_PARTICLES[Math.floor(Math.random() * HANNAH_PARTICLES.length)],
        left: 10 + Math.random() * 80,
        delay: Math.random() * 0.4,
        duration: 1.4 + Math.random() * 0.8,
      }];
      return next.slice(-16);
    });
    const t = setInterval(spawn, 220);
    return () => clearInterval(t);
  }, []);

  return (
    <div onClick={close} style={{ position:"fixed", inset:0, zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
      background:"rgba(0,0,0,0.72)", backdropFilter:"blur(4px)" }}>
      {/* floating particles */}
      {particles.map(p => (
        <span key={p.id} className="sparkle-particle" style={{ left:`${p.left}%`, bottom:"15%", animationDelay:`${p.delay}s`, animationDuration:`${p.duration}s` }}>{p.emoji}</span>
      ))}

      <div className={`hannah-card${closing?" out":""}`} onClick={e=>e.stopPropagation()}
        style={{ background:"linear-gradient(135deg,#1a1020,#120818,#0d1020)", border:"1px solid #c4a0d455",
          borderRadius:20, padding:"40px 48px 32px", textAlign:"center", maxWidth:360, position:"relative", overflow:"visible",

          borderRadius:"50%", background:"radial-gradient(#FFD70055,transparent 70%)", pointerEvents:"none" }} />

        <div className="crown" style={{ fontSize:52, marginBottom:8, display:"block" }}>👑</div>

        <div style={{ fontSize:11, color:"#c4a0d4aa", letterSpacing:4, textTransform:"uppercase", marginBottom:16 }}>
          A Message from the Universe

        <div style={{ fontFamily:"'Noto Serif SC',serif", fontSize:22, fontWeight:700, lineHeight:1.5,

        </div>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:32, fontWeight:900, letterSpacing:6,

const STORAGE_KEY = "xhs_cover_draft_v1";
const FAVS_KEY    = "xhs_cover_favs_v1";
const CUSTOM_TPL_KEY = "xhs_cover_custom_tpl_v1";

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAVS_KEY)) || []; } catch { return []; }
}

function loadCustomTpls() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_TPL_KEY)) || []; } catch { return []; }
}

function saveCustomTpls(tpls) {
  try { localStorage.setItem(CUSTOM_TPL_KEY, JSON.stringify(tpls)); } catch {}
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // 合并默认值，防止旧草稿缺少新字段
    const merged = { ...DEF, ...parsed };
    // Fix: 迁移旧版字符串格式的标签为对象格式
    if (merged.tags && merged.tags.length > 0 && typeof merged.tags[0] === "string") {
      merged.tags = merged.tags.map((t, i) => ({ id: `migrated_${i}`, text: t }));
    }
    return merged;
  } catch { return null; }
}

// Fix: 保存草稿时排除 base64 图片，避免超出 localStorage 5MB 限额导致静默失败
function saveDraft(state) {
  try {
    const { img, ...rest } = state; // 图片体积过大，不持久化
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rest));
  } catch (e) {
    console.warn("草稿保存失败（可能存储空间不足）", e);
  }
}

  const [customTpls, setCustomTpls] = useState(loadCustomTpls());
  const [showSaveModal, setShowSaveModal] = useState(false);
  const [customTplName, setCustomTplName] = useState("");

  const toggleFav = useCallback((id, e) => {
    e.stopPropagation();
    setFavs(prev => {
      const next = prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id];
      try { localStorage.setItem(FAVS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const saveCustomTpl = useCallback(() => {
    if (!customTplName.trim()) {
      alert("请输入模板名称");
      return;
    }
    const newTpl = {
      id: `custom_${Date.now()}`,
      name: customTplName.trim(),
      e: "💾",
      tc: s.customTc || t.tc,
      sc: s.customSc || t.sc,
      tb: t.tb,
      tt: t.tt,
      ov: t.ov,
      ac: t.ac,
      bd: t.bd,
      bg: t.bg,
      ly: t.ly,
      category: t.category,
      fonts: t.fonts,
      custom: true,
      createdAt: Date.now(),
    };
    const next = [...customTpls, newTpl];
    setCustomTpls(next);
    saveCustomTpls(next);
    setShowSaveModal(false);
    setCustomTplName("");
  }, [customTplName, s.customTc, s.customSc, t, customTpls]);

  const deleteCustomTpl = useCallback((id, e) => {
    e.stopPropagation();
    const next = customTpls.filter(t => t.id !== id);
    setCustomTpls(next);
    saveCustomTpls(next);
  }, [customTpls]);
  const ref = useRef(null);
  const tplBarRef = useRef(null);
  // 预加载导出库（Promise ref，避免导出时才拉取造成延迟）
  const domToImagePromise = useRef(null);
  const update = useCallback((k, v) => setState(p => ({ ...p, [k]: v })), []);
  const tpl = T.find(x => x.id === state.tid) || T[0];
  // 兼容旧变量名 s/u/exp，降低改动范围
  const s = state, u = update, exp = isExporting;

  // 自动保存草稿（防抖 800ms）
  useEffect(() => {
    const timer = setTimeout(() => {
      saveDraft(state);
      setDraftSaved(true);
      setTimeout(() => setDraftSaved(false), 1500);
    }, 800);
    return () => clearTimeout(timer);
  }, [state]);

  // 预加载 dom-to-image-more
  useEffect(() => {
    domToImagePromise.current = import("https://cdn.jsdelivr.net/npm/dom-to-image-more@3.1.6/+esm")
      .then(m => m.default || m)
      .catch(() => new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/dom-to-image-more@3.1.6/dist/dom-to-image-more.min.js";
        script.onload = () => resolve(window.domtoimage);
        script.onerror = () => reject(new Error("导出库加载失败，请检查网络"));
        document.head.appendChild(script);
      }));
  }, []);

  const handleImg = e => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const src = ev.target.result;
      u("img", src);
      analyzeBg(src, data => {
        setState(p => ({ ...p, lum: data.lum }));
      });
    };
    r.readAsDataURL(f);
  };

  const handleSmartRandom = useCallback(() => {
    if (!s.img) {
      alert("请先上传图片");
      return;
    }
    analyzeBg(s.img, data => {
      setState(p => applySmartRandom(p, data));
    });
  }, [s.img]);

  const handleDrag = useCallback((id, pos) => setState(p => ({ ...p, off: { ...p.off, [id]: pos } })), []);

  const handleResizeStart = useCallback(() => setIsResizing(true), []);
  const handleResizeEnd = useCallback(() => setIsResizing(false), []);
  const handleResize = useCallback((e) => {
    if (!isResizing) return;
    const container = document.getElementById("main-container");
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const newWidth = Math.max(300, Math.min(e.clientX - rect.left, window.innerWidth - 360));
    setPreviewWidth(newWidth);
  }, [isResizing]);

  useEffect(() => {
    if (isResizing) {
      document.addEventListener("mousemove", handleResize);
      document.addEventListener("mouseup", handleResizeEnd);
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
    }
    return () => {
      document.removeEventListener("mousemove", handleResize);
      document.removeEventListener("mouseup", handleResizeEnd);
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
  }, [isResizing, handleResize, handleResizeEnd]);

  const handleExport = useCallback(async () => {
    const el = ref.current; if (!el) return; setIsExporting(true);
    try {
      const targetEl = el.firstChild || el;

      // Fix: 直接 await Promise，彻底替换轮询逻辑
      if (!domToImagePromise.current) {
        throw new Error("导出库尚未初始化，请稍后重试");
      }
      const domtoimage = await domToImagePromise.current;

      await new Promise(r => setTimeout(r, 100));

      const blob = await domtoimage.toBlob(targetEl, {
        width: 540, height: 720, quality: 1, scale: 2,
        style: { position: "relative", transform: "none" }
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const sanitizedTitle = (s.title || "无标题").replace(/[\\/:*?"<>|]/g, "_");
      const date = new Date().toISOString().split("T")[0];
      a.download = `小红书封面-${sanitizedTitle}-${date}.png`;
      a.href = url; a.click();
      URL.revokeObjectURL(url);
      setTimeout(() => setShowHannah(true), 400);
    } catch (err) {
      console.error(err);
      alert(`导出失败：${err.message || "请尝试截图保存或刷新页面后重试"}`);
    } finally {
      // Fix: 使用 finally 确保无论成功失败都重置导出状态
      setIsExporting(false);
    }
  }, [s.title]);

  const sh = (ic, tx) => <div style={{ fontSize: 10, fontWeight: 700, color: "#555", letterSpacing: 2, marginBottom: 12, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 5 }}><span style={{ fontSize: 13 }}>{ic}</span><span>{tx}</span></div>;

  const tabs = [{ k: "text", i: "✏️", l: "文字" }, { k: "style", i: "🎨", l: "样式" }, { k: "image", i: "🖼", l: "图片" }, { k: "tags", i: "🏷", l: "标签" }];

  return (
    <DragCtx.Provider value={handleDrag}>
      <div style={{ height: "100%", background: "#0d0d12", fontFamily: "'Noto Sans SC','PingFang SC',-apple-system,sans-serif", color: "#fff", display: "flex", flexDirection: "column" }}>
        <header style={{ padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid #1a1a24", background: "#111118", flexShrink: 0, zIndex: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 30, height: 30, borderRadius: 7, background: "linear-gradient(135deg,#FF2442,#FF6B81)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 900 }}>红</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>小红书封面生成器</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ color: "#555", fontSize: 10 }}>{T.length} Templates · Drag to Edit</div>
                {favs.length > 0 && <div style={{ color: "#FFD700aa", fontSize: 10 }}>⭐ {favs.length} 已收藏</div>}
                {draftSaved && <div style={{ color: "#2DBE6C", fontSize: 10, transition: "opacity .3s" }}>✓ 草稿已保存</div>}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { u("off", DEF.off); }} style={{ padding: "7px 14px", background: "#1a1a24", border: "1px solid #2a2a35", borderRadius: 7, color: "#888", fontSize: 11, cursor: "pointer" }}>↺ 重置位置</button>
            <button onClick={handleSmartRandom}
              style={{ padding: "7px 14px", background: s.img ? "#1a2a1a" : "#1a1a24", border: s.img ? "1px solid #3a5a3a" : "1px solid #2a2a35", borderRadius: 7, color: s.img ? "#2DBE6C" : "#555", fontSize: 11, cursor: s.img ? "pointer" : "not-allowed", opacity: s.img ? 1 : 0.6 }}>
              🎲 智能随机
            </button>
            {/* Fix: 内联二步确认，替换阻塞式 window.confirm */}
            {confirmClear ? (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => { localStorage.removeItem(STORAGE_KEY); setState(DEF); setConfirmClear(false); }}
                  style={{ padding: "7px 10px", background: "#2a0808", border: "1px solid #5a1a1a", borderRadius: 7, color: "#ff6666", fontSize: 11, cursor: "pointer" }}>确认清除</button>
                <button onClick={() => setConfirmClear(false)}
                  style={{ padding: "7px 10px", background: "#1a1a24", border: "1px solid #2a2a35", borderRadius: 7, color: "#888", fontSize: 11, cursor: "pointer" }}>取消</button>
              </div>
            ) : (
              <button onClick={() => setConfirmClear(true)}
                style={{ padding: "7px 14px", background: "#1a1a24", border: "1px solid #2a2a35", borderRadius: 7, color: "#666", fontSize: 11, cursor: "pointer" }}>🗑 清除草稿</button>
            )}
            <button onClick={handleExport} disabled={isExporting} style={{ padding: "7px 20px", background: isExporting ? "#333" : "linear-gradient(135deg,#FF2442,#FF6B81)", border: "none", borderRadius: 7, color: "#fff", fontSize: 12, fontWeight: 700, cursor: isExporting ? "wait" : "pointer", boxShadow: isExporting ? "none" : "0 4px 16px #FF244240" }}>
              {isExporting ? "⏳ 导出中..." : "⬇ 导出 PNG"}
            </button>
          </div>
        </header>

        <div style={{ borderBottom: "1px solid #1a1a24", background: "#0f0f16", flexShrink: 0 }}>
          {(() => {
            const TplBtn = ({ tm, isFav }) => {
              const ac = s.tid === tm.id;
              const isHov = hoveredTpl === tm.id;
              const btnRef = useRef(null);
              const handleClick = useCallback(() => {
                // 保存当前滚动位置
                const scrollLeft = tplBarRef.current?.scrollLeft || 0;
                const f = tm.fonts || {};
                setState(p => ({
                  ...p,
                  tid: tm.id,
                  off: DEF.off,
                  ...(f.title && { fidTitle: f.title }),
                  ...(f.sub   && { fidSub:   f.sub   }),
                  ...(f.loc   && { fidLoc:   f.loc   }),
                  ...(f.d1    && { fidD1:    f.d1    }),
                }));
                // 恢复滚动位置
                setTimeout(() => {
                  if (tplBarRef.current) {
                    tplBarRef.current.scrollLeft = scrollLeft;
                  }
                }, 0);
              }, [tm, tplBarRef]);
              return (
                <div ref={btnRef} style={{ flexShrink:0, position:"relative" }}
                  onMouseEnter={() => setHoveredTpl(tm.id)}
                  onMouseLeave={() => setHoveredTpl(null)}>
                  <button onClick={handleClick}
                    style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:0, background:"none", border:"none", cursor:"pointer",
                      opacity: ac ? 1 : isFav ? .7 : .5, transform: ac ? "scale(1)" : "scale(0.92)", transition:"all .2s" }}>
                    <div style={{ borderRadius:7, overflow:"hidden",
                      border: ac ? `2px solid ${tm.ac}` : isFav ? "2px solid #FFD70066" : "2px solid transparent",
                      boxShadow: ac ? `0 4px 16px ${tm.ac}33` : isFav ? "0 2px 8px #FFD70022" : "none" }}>
                      <Mini tid={tm.id} st={s} />
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:2 }}>
                      <span style={{ fontSize:10 }}>{tm.e}</span>
                      <span style={{ fontSize:9, color: ac ? "#fff" : "#777", fontWeight: ac ? 700 : 400, maxWidth:60, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tm.name}</span>
                    </div>
                  </button>
                  <button onClick={e => toggleFav(tm.id, e)}
                    style={{ position:"absolute", top:2, right:2, width:16, height:16, borderRadius:3, background:"rgba(0,0,0,0.7)", border:"none", cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:10,
                      opacity: isFav ? 0.9 : isHov ? 1 : 0, transition:"opacity .15s", zIndex:10 }}>
                    {isFav ? "⭐" : "☆"}
                  </button>
                </div>
              );
            };

            const imgTpls    = T.filter(tm => !tm.pure);
            const pureTpls   = T.filter(tm =>  tm.pure);
            const favImgTpls   = imgTpls.filter(tm => favs.includes(tm.id));
            const restImgTpls  = imgTpls.filter(tm => !favs.includes(tm.id));
            const favPureTpls  = pureTpls.filter(tm => favs.includes(tm.id));
            const restPureTpls = pureTpls.filter(tm => !favs.includes(tm.id));
            const customImgTpls  = customTpls.filter(tm => !tm.pure);
            const customPureTpls = customTpls.filter(tm =>  tm.pure);

            // 竖向分隔符：图片模版 | 纯文字模版
            const Divider = () => (
              <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, padding:"0 10px", alignSelf:"stretch" }}>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#333,#333,transparent)" }} />
                <div style={{ fontSize:8, color:"#FF244255", letterSpacing:1, writingMode:"vertical-rl", whiteSpace:"nowrap" }}>纯文字</div>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#333,#333,transparent)" }} />
              </div>
            );

            // 收藏区分隔
            const FavDivider = () => (
              <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, padding:"0 6px", alignSelf:"stretch" }}>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#FFD70033,#FFD70033,transparent)" }} />
                <span style={{ fontSize:8, color:"#FFD70044", writingMode:"vertical-rl" }}>收藏</span>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#FFD70033,#FFD70033,transparent)" }} />
              </div>
            );

            // 自定义模板分隔符
            const CustomDivider = () => (
              <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, padding:"0 6px", alignSelf:"stretch" }}>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#FF244233,#FF244233,transparent)" }} />
                <span style={{ fontSize:8, color:"#FF244244", writingMode:"vertical-rl" }}>自定义</span>
                <div style={{ width:1, flex:1, background:"linear-gradient(to bottom,transparent,#FF244233,#FF244233,transparent)" }} />
              </div>
            );

            // 自定义模板按钮（带删除功能）
            const CustomTplBtn = ({ tm }) => {
              const ac = s.tid === tm.id;
              const isHov = hoveredTpl === tm.id;
              const handleClick = useCallback(() => {
                const scrollLeft = tplBarRef.current?.scrollLeft || 0;
                setState(p => ({
                  ...p,
                  tid: tm.id,
                  off: DEF.off,
                  customTc: tm.tc,
                  customSc: tm.sc,
                }));
                setTimeout(() => {
                  if (tplBarRef.current) {
                    tplBarRef.current.scrollLeft = scrollLeft;
                  }
                }, 0);
              }, [tm, tplBarRef]);
              return (
                <div style={{ flexShrink:0, position:"relative" }}
                  onMouseEnter={() => setHoveredTpl(tm.id)}
                  onMouseLeave={() => setHoveredTpl(null)}>
                  <button onClick={handleClick}
                    style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:0, background:"none", border:"none", cursor:"pointer",
                      opacity: ac ? 1 : .7, transform: ac ? "scale(1)" : "scale(0.92)", transition:"all .2s" }}>
                    <div style={{ borderRadius:7, overflow:"hidden",
                      border: ac ? `2px solid ${tm.ac}` : "2px solid #FF244266",
                      boxShadow: ac ? `0 4px 16px ${tm.ac}33` : "none" }}>
                      <Mini tid={tm.id} st={{ ...s, customTc: tm.tc, customSc: tm.sc }} customTpls={customTpls} />
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:2 }}>
                      <span style={{ fontSize:10 }}>{tm.e}</span>
                      <span style={{ fontSize:9, color: ac ? "#fff" : "#777", fontWeight: ac ? 700 : 400, maxWidth:60, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tm.name}</span>
                    </div>
                  </button>
                  <button onClick={e => deleteCustomTpl(tm.id, e)}
                    style={{ position:"absolute", top:2, right:2, width:16, height:16, borderRadius:3, background:"rgba(0,0,0,0.7)", border:"none", cursor:"pointer",
                      display:"flex", alignItems:"center", justifyContent:"center", fontSize:10,
                      opacity: isHov ? 1 : 0, transition:"opacity .15s", zIndex:10, color: "#ff6666" }}>
                    ×
                  </button>
                </div>
              );
            };

            return (
              <div ref={tplBarRef} style={{ display:"flex", gap:10, overflowX:"auto", padding:"10px 16px 8px", scrollbarWidth:"thin", alignItems:"center" }}>
                {/* 自定义图片模板 */}
                {customImgTpls.length > 0 && <>{customImgTpls.map(tm => <CustomTplBtn key={tm.id} tm={tm} />)}<CustomDivider /></>}
                {/* 收藏的图片模版 */}
                {favImgTpls.length > 0 && <>{favImgTpls.map(tm => <TplBtn key={tm.id} tm={tm} isFav={true} />)}<FavDivider /></>}
                {/* 普通图片模版 */}
                {restImgTpls.map(tm => <TplBtn key={tm.id} tm={tm} isFav={false} />)}
                {/* 中间分隔符 */}
                <Divider />
                {/* 自定义纯文字模板 */}
                {customPureTpls.length > 0 && <>{customPureTpls.map(tm => <CustomTplBtn key={tm.id} tm={tm} />)}<CustomDivider /></>}
                {/* 收藏的纯文字模版 */}
                {favPureTpls.length > 0 && <>{favPureTpls.map(tm => <TplBtn key={tm.id} tm={tm} isFav={true} />)}<FavDivider /></>}
                {/* 普通纯文字模版 */}
                {restPureTpls.map(tm => <TplBtn key={tm.id} tm={tm} isFav={false} />)}
              </div>
            );
          })()}
        </div>

        <div id="main-container" style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>
          <main style={{ width: previewWidth, minWidth: 280, display: "flex", alignItems: "center", justifyContent: "center", background: "radial-gradient(ellipse at 50% 40%,#15151f,#0d0d12 70%)", padding: 12, overflow: "hidden", position: "relative", flexShrink: 0 }}>
            {!s.img && !tpl.pure ? (
              /* ── 无图片时：居中上传引导 ── */
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:0, textAlign:"center", width:"100%", height:"100%" }}>
                {/* 小预览（缩小显示当前模版效果） */}
                <div style={{ borderRadius:8, overflow:"hidden", boxShadow:`0 8px 40px #0008,0 0 40px ${tpl.ac}14`, transform:"scale(0.45)", transformOrigin:"center bottom", marginBottom:-130, opacity:0.55 }}>
                  <Cover s={s} innerRef={ref} customTpls={customTpls} />
                </div>
                {/* 上传区域 */}
                <label style={{ cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:14,
                  padding:"28px 36px", borderRadius:16, border:`1.5px dashed ${tpl.ac}55`,
                  background:`radial-gradient(ellipse at 50% 60%,${tpl.ac}0a,transparent 70%)`,
                  transition:"border-color .2s,background .2s", position:"relative", zIndex:2 }}
                  onMouseEnter={e => e.currentTarget.style.borderColor=tpl.ac}
                  onMouseLeave={e => e.currentTarget.style.borderColor=`${tpl.ac}55`}>
                  <div style={{ width:56, height:56, borderRadius:14, background:`${tpl.ac}22`, border:`1.5px solid ${tpl.ac}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:26 }}>📷</div>
                  <div>
                    <div style={{ color:"#ddd", fontSize:14, fontWeight:700, marginBottom:5 }}>上传背景图片</div>
                    <div style={{ color:"#555", fontSize:11 }}>推荐尺寸 1080 × 1440</div>
                  </div>
                  <div style={{ padding:"8px 22px", background:`linear-gradient(135deg,${tpl.ac},${tpl.ac}bb)`, borderRadius:8, color:"#fff", fontSize:12, fontWeight:700, boxShadow:`0 4px 16px ${tpl.ac}55` }}>
                    选择图片
                  </div>
                  <input type="file" accept="image/*" onChange={handleImg} style={{ display:"none" }} />
                </label>
                <div style={{ marginTop:16, color:"#333", fontSize:10, letterSpacing:1 }}>或选择下方纯文字模版直接使用</div>
                {/* 提示拖拽 */}
                <div style={{ position:"absolute", top:12, left:14, color:"#2a2a35", fontSize:10, letterSpacing:1 }}>💡 上传图片后可拖拽调整文字位置</div>
              </div>
            ) : (
              /* ── 有图片（或纯文字模版）：正常预览 ── */
              <>
                <div style={{ position:"absolute", top:10, left:14, color:"#333", fontSize:10, letterSpacing:1 }}>💡 拖拽文字可调整位置</div>
                <div style={{ borderRadius:8, overflow:"hidden", boxShadow:`0 24px 80px #0009,0 0 60px ${tpl.ac}08`, transform:`scale(${SC})`, transformOrigin:"center center" }}>
                  <Cover s={s} innerRef={ref} customTpls={customTpls} />
                </div>
              </>
            )}
          </main>

          <div className={`resizer ${isResizing ? "active" : ""}`} onMouseDown={handleResizeStart} />

          <aside style={{ flex: 1, minWidth: 360, background: "#111118", borderLeft: "1px solid #1a1a24", display: "flex", flexDirection: "column", minHeight: 0 }}>
            <div style={{ display: "flex", borderBottom: "1px solid #1a1a24", flexShrink: 0 }}>
              {tabs.map(t => (
                <button key={t.k} onClick={() => setTab(t.k)}
                  style={{ flex: 1, padding: "9px 0", background: "none", border: "none", borderBottom: tab === t.k ? `2px solid ${tpl.ac}` : "2px solid transparent", color: tab === t.k ? "#fff" : "#555", fontSize: 11, fontWeight: tab === t.k ? 700 : 400, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <span style={{ fontSize: 14 }}>{t.i}</span><span>{t.l}</span>
                </button>
              ))}
            </div>

            <div className="scrollable" style={{ flex: 1, padding: "14px 16px", minHeight: 0 }}>
              {tab === "text" && <>
                {sh("✏️", "文字与字号")}
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}><div style={{ flex: 1 }}><F l="主标题" v={s.title} o={v => u("title", v)} /></div><div style={{ width: 70 }}><SL l="字号" v={s.ts} o={v => u("ts", v)} mn={36} mx={120} ac={tpl.ac} /></div></div>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}><div style={{ flex: 1 }}><F l="副标题" v={s.sub} o={v => u("sub", v)} /></div><div style={{ width: 70 }}><SL l="字号" v={s.ss} o={v => u("ss", v)} mn={10} mx={36} ac={tpl.ac} /></div></div>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}><div style={{ flex: 1 }}><F l="地点" v={s.loc} o={v => u("loc", v)} /></div><div style={{ width: 70 }}><SL l="字号" v={s.ls} o={v => u("ls", v)} mn={16} mx={56} ac={tpl.ac} /></div></div>
                <F l="描述 1" v={s.d1} o={v => u("d1", v)} />
                <F l="描述 2" v={s.d2} o={v => u("d2", v)} />
                <F l="顶部文字" v={s.top} o={v => u("top", v)} />
                <F l="底部文字" v={s.bot} o={v => u("bot", v)} />
                <div style={{ marginTop: 8 }}>
                  {sh("🔤", "全局字体")}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    {FONTS.map(f => (
                      <button key={f.id} onClick={() => {
                          // Fix: 合并为单次 setState，避免多次触发渲染
                          setState(p => ({ ...p, fid: f.id, fidTitle: f.id, fidSub: f.id, fidLoc: f.id, fidD1: f.id }));
                        }}
                        style={{ padding: "8px 6px", background: s.fid === f.id ? "#1e1e2e" : "#14141c", border: s.fid === f.id ? `1.5px solid ${tpl.ac}` : "1.5px solid #222", borderRadius: 7, cursor: "pointer", textAlign: "center" }}>
                        <div style={{ fontFamily: f.family, fontSize: 16, color: s.fid === f.id ? "#fff" : "#aaa", fontWeight: 700 }}>字体</div>
                        <div style={{ fontSize: 9, color: "#666", marginTop: 2 }}>{f.name}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{ marginTop: 12 }}>
                  {sh("✏️", "独立字体")}
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: "#666", marginBottom: 4 }}>标题字体</div>
                    <select value={s.fidTitle || s.fid} onChange={e => u("fidTitle", e.target.value)}
                      style={{ width: "100%", padding: "8px 10px", background: "#17171f", border: "1px solid #26263a", borderRadius: 6, color: "#eee", fontSize: 12, cursor: "pointer" }}>
                      {FONTS.map(f => <option key={f.id} value={f.id}>{f.name} ({f.type === "cn" ? "中文" : "英文"})</option>)}
                    </select>
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: "#666", marginBottom: 4 }}>副标题字体</div>
                    <select value={s.fidSub || s.fid} onChange={e => u("fidSub", e.target.value)}
                      style={{ width: "100%", padding: "8px 10px", background: "#17171f", border: "1px solid #26263a", borderRadius: 6, color: "#eee", fontSize: 12, cursor: "pointer" }}>
                      {FONTS.map(f => <option key={f.id} value={f.id}>{f.name} ({f.type === "cn" ? "中文" : "英文"})</option>)}
                    </select>
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: "#666", marginBottom: 4 }}>地点字体</div>
                    <select value={s.fidLoc || s.fid} onChange={e => u("fidLoc", e.target.value)}
                      style={{ width: "100%", padding: "8px 10px", background: "#17171f", border: "1px solid #26263a", borderRadius: 6, color: "#eee", fontSize: 12, cursor: "pointer" }}>
                      {FONTS.map(f => <option key={f.id} value={f.id}>{f.name} ({f.type === "cn" ? "中文" : "英文"})</option>)}
                    </select>
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: "#666", marginBottom: 4 }}>描述字体</div>
                    <select value={s.fidD1 || s.fid} onChange={e => u("fidD1", e.target.value)}
                      style={{ width: "100%", padding: "8px 10px", background: "#17171f", border: "1px solid #26263a", borderRadius: 6, color: "#eee", fontSize: 12, cursor: "pointer" }}>
                      {FONTS.map(f => <option key={f.id} value={f.id}>{f.name} ({f.type === "cn" ? "中文" : "英文"})</option>)}
                    </select>
                  </div>
                </div>
              </>}

              {tab === "style" && <>
                {sh("🎨", "色调调整")}
                <SL l="色调旋转" v={s.hue} o={v => u("hue", v)} mn={0} mx={360} ac={tpl.ac} u="°" />
                {s.img && !tpl.pure && <>
                  {sh("🌈", "背景滤镜")}
                  <SL l="模糊" v={s.blur} o={v => u("blur", v)} mn={0} mx={20} ac={tpl.ac} u="px" />
                  <SL l="亮度" v={s.bright} o={v => u("bright", v)} mn={20} mx={200} ac={tpl.ac} u="%" />
                  <SL l="对比度" v={s.contrast} o={v => u("contrast", v)} mn={20} mx={200} ac={tpl.ac} u="%" />
                  <SL l="饱和度" v={s.sat} o={v => u("sat", v)} mn={0} mx={300} ac={tpl.ac} u="%" />
                </>}
                {sh("🤖", "文字颜色")}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, color: "#666", marginBottom: 6 }}>主标题颜色</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {TEXT_COLORS.map(c => {
                      const isLight = c.value === "#ffffff" || c.value === "#F5F0E6";
                      return (
                        <button key={c.id} onClick={() => u("customTc", s.customTc === c.value ? null : c.value)}
                          style={{ width: 32, height: 32, borderRadius: 6, background: c.value, border: s.customTc === c.value ? `2px solid ${tpl.ac}` : "2px solid #333", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: isLight ? "#333" : "#fff" }}>
                          {s.customTc === c.value ? "✓" : ""}
                        </button>
                      );
                    })}
                    <button onClick={() => u("customTc", null)}
                      style={{ width: 32, height: 32, borderRadius: 6, background: "linear-gradient(45deg,#333,#555)", border: !s.customTc ? `2px solid ${tpl.ac}` : "2px solid #333", cursor: "pointer", fontSize: 9, color: "#aaa" }}>
                      自动
                    </button>
                  </div>
                </div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, color: "#666", marginBottom: 6 }}>副标题颜色</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {TEXT_COLORS.map(c => {
                      const isLight = c.value === "#ffffff" || c.value === "#F5F0E6";
                      return (
                        <button key={c.id} onClick={() => u("customSc", s.customSc === c.value ? null : c.value)}
                          style={{ width: 32, height: 32, borderRadius: 6, background: c.value, border: s.customSc === c.value ? `2px solid ${tpl.ac}` : "2px solid #333", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: isLight ? "#333" : "#fff" }}>
                          {s.customSc === c.value ? "✓" : ""}
                        </button>
                      );
                    })}
                    <button onClick={() => u("customSc", null)}
                      style={{ width: 32, height: 32, borderRadius: 6, background: "linear-gradient(45deg,#333,#555)", border: !s.customSc ? `2px solid ${tpl.ac}` : "2px solid #333", cursor: "pointer", fontSize: 9, color: "#aaa" }}>
                      自动
                    </button>
                  </div>
                </div>
                <button onClick={() => u("auto", !s.auto)}
                  style={{ width: "100%", padding: "10px", background: s.auto ? "#1a2a1a" : "#14141c", border: s.auto ? "1.5px solid #2DBE6C" : "1.5px solid #222", borderRadius: 8, cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 18, height: 18, borderRadius: 4, background: s.auto ? "#2DBE6C" : "#333", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff" }}>{s.auto ? "✓" : ""}</div>
                  <div style={{ textAlign: "left" }}>
                    <div style={{ color: "#ddd", fontSize: 12, fontWeight: 600 }}>自适应文字颜色</div>
                    <div style={{ color: "#666", fontSize: 10 }}>根据背景图亮度自动调整明暗</div>
                  </div>
                </button>
                {s.auto && s.lum !== null && <div style={{ marginTop: 8, padding: "8px 10px", background: "#14141c", borderRadius: 6, fontSize: 11, color: "#666" }}>
                  亮度 {Math.round(s.lum)} → 文字{s.lum > 128 ? "深色" : "浅色"}模式
                </div>}
                <div style={{ marginTop: 16 }}>
                  <button onClick={() => setShowSaveModal(true)}
                    style={{ width: "100%", padding: "10px", background: "linear-gradient(135deg,#FF2442,#FF6B81)", border: "none", borderRadius: 8, cursor: "pointer", color: "#fff", fontSize: 12, fontWeight: 700, boxShadow: "0 4px 12px #FF244240" }}>
                    💾 保存为自定义模板
                  </button>
                </div>
              </>}

              {tab === "image" && <>
                {sh("🖼", "背景图片")}
                <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, padding: "18px", border: "1.5px dashed #26263a", borderRadius: 10, cursor: "pointer", background: "#14141c" }}>
                  <span style={{ fontSize: 22 }}>📷</span>
                  <div><div style={{ color: "#999", fontSize: 13 }}>点击上传背景图</div><div style={{ color: "#555", fontSize: 10, marginTop: 2 }}>推荐 1080×1440</div></div>
                  <input type="file" accept="image/*" onChange={handleImg} style={{ display: "none" }} />
                </label>
                {s.img && <>
                  <div style={{ marginTop: 10, display: "flex", gap: 8, alignItems: "center" }}>
                    <img src={s.img} alt="" style={{ width: 56, height: 38, objectFit: "cover", borderRadius: 6, border: "1px solid #333" }} />
                    <button onClick={() => { u("img", null); u("lum", null); u("auto", false); }}
                      style={{ flex: 1, padding: "7px", background: "#1e1218", border: "1px solid #3a2028", borderRadius: 6, color: "#ff6666", cursor: "pointer", fontSize: 12 }}>移除</button>
                  </div>
                  <div style={{ marginTop: 14 }}>
                    {sh("✂️", "裁剪与位移")}
                    <SL l="缩放" v={s.bgS} o={v => u("bgS", v)} mn={80} mx={200} ac={tpl.ac} u="%" />
                    <SL l="水平位移" v={s.bgX} o={v => u("bgX", v)} mn={0} mx={100} ac={tpl.ac} u="%" />
                    <SL l="垂直位移" v={s.bgY} o={v => u("bgY", v)} mn={0} mx={100} ac={tpl.ac} u="%" />
                  </div>
                  <div style={{ marginTop: 14 }}>
                    {sh("🎨", "图片滤镜")}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                      {FILTERS.map(f => (
                        <button key={f.id} onClick={() => u("filter", f.id)}
                          style={{ padding: "8px 4px", background: s.filter === f.id ? `${tpl.ac}22` : "#14141c", border: s.filter === f.id ? `1.5px solid ${tpl.ac}` : "1px solid #26263a", borderRadius: 6, color: s.filter === f.id ? "#fff" : "#888", cursor: "pointer", fontSize: 11, transition: "all .15s" }}>
                          {f.name}
                        </button>
                      ))}
                    </div>
                  </div>
                </>}
                {tpl.pure && <div style={{ marginTop: 12, padding: "10px", background: "#1a1a18", borderRadius: 8, fontSize: 11, color: "#887744" }}>📌 纯文字模版不使用背景图</div>}
              </>}

              {tab === "tags" && <>
                {sh("🏷", "标签管理")}
                {s.tags.map((tag, i) => (
                  // Fix: 使用 tag.id 作为稳定 key，避免编辑时 key 变化导致重渲染
                  <div key={tag.id} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                    <input value={tag.text} onChange={e => {
                      const updated = s.tags.map((t, j) => j === i ? { ...t, text: e.target.value } : t);
                      u("tags", updated);
                    }} style={{ ...IS, flex: 1 }} />
                    <button onClick={() => u("tags", s.tags.filter((_, j) => j !== i))} style={{ width: 30, height: 34, background: "#1e1218", border: "1px solid #3a2028", borderRadius: 6, color: "#ff6666", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>
                  </div>
                ))}
                {s.tags.length < 6 && <button onClick={() => u("tags", [...s.tags, { id: `t${Date.now()}`, text: "#新标签" }])} style={{ width: "100%", padding: "8px", background: "transparent", border: "1.5px dashed #26263a", borderRadius: 8, color: "#555", cursor: "pointer", fontSize: 12 }}>+ 添加标签</button>}
              </>}
            </div>
          </aside>
        </div>
      </div>
      {showHannah && (
        <HannahModal onClose={() => setShowHannah(false)} />
      )}
      {showSaveModal && (
        <div onClick={() => setShowSaveModal(false)} style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.72)", backdropFilter: "blur(4px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#1a1a24", border: "1px solid #333", borderRadius: 16, padding: "28px 32px", maxWidth: 320, width: "90%" }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, textAlign: "center" }}>💾 保存自定义模板</div>
            <input
              value={customTplName}
              onChange={e => setCustomTplName(e.target.value)}
              placeholder="输入模板名称"
              style={{ ...IS, marginBottom: 16 }}
              autoFocus
            />
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setShowSaveModal(false)} style={{ flex: 1, padding: "10px", background: "#222", border: "1px solid #333", borderRadius: 8, color: "#888", cursor: "pointer", fontSize: 13 }}>取消</button>
              <button onClick={saveCustomTpl} style={{ flex: 1, padding: "10px", background: "linear-gradient(135deg,#FF2442,#FF6B81)", border: "none", borderRadius: 8, color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>保存</button>
            </div>
          </div>
        </div>
      )}
    </DragCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
