function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rgbToHue(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0;
  if (max === min) return 0;
  if (max === r) h = (g - b) / (max - min);
  else if (max === g) h = 2 + (b - r) / (max - min);
  else h = 4 + (r - g) / (max - min);
  h *= 60;
  if (h < 0) h += 360;
  return h;
}

// 使用 requestIdleCallback 优化图片分析
function analyzeBgAsync(src, callback) {
  const fallback = { lum: 128, avgR: 128, avgG: 128, avgB: 128, hue: 0 };
  const img = new Image();
  if (src && !src.startsWith("data:")) img.crossOrigin = "anonymous";
  
  const processImage = () => {
    try {
      const canvas = document.createElement("canvas");
      canvas.width = 50; canvas.height = 50;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, 50, 50);
      const data = ctx.getImageData(0, 0, 50, 50).data;
      let t = 0, r = 0, g = 0, b = 0;
      for (let i = 0; i < data.length; i += 4) {
        t += data[i] * .299 + data[i + 1] * .587 + data[i + 2] * .114;
        r += data[i]; g += data[i + 1]; b += data[i + 2];
      }
      const count = data.length / 4;
      callback({
        lum: t / count,
        avgR: r / count,
        avgG: g / count,
        avgB: b / count,
        hue: rgbToHue(r / count, g / count, b / count)
      });
    } catch (e) {
      console.warn("图片分析失败", e);
      callback(fallback);
    }
  };

  img.onload = () => {
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => processImage(), { timeout: 1000 });
    } else {
      setTimeout(processImage, 0);
    }
  };
  
  img.onerror = () => { console.warn("背景图片加载失败，使用默认亮度值"); callback(fallback); };
  img.src = src;
}

function getRandomTemplate(imgData) {
  const { lum, hue } = imgData;
  const isDark = lum < 100;
  const isLight = lum > 180;
  const isWarm = hue >= 0 && hue < 60 || hue >= 300;
  const isCool = hue >= 120 && hue < 270;

  let filtered = TEMPLATES.filter(tpl => !(tpl.pure && isLight));
  if (filtered.length === 0) filtered = TEMPLATES;

  const hasCategory = (tpl, cat) => tpl.category?.includes(cat);

  const groups = {
    dark:     filtered.filter(t => hasCategory(t, 'dark')),
    light:    filtered.filter(t => hasCategory(t, 'light')),
    warm:     filtered.filter(t => hasCategory(t, 'warm')),
    cool:     filtered.filter(t => hasCategory(t, 'cool')),
    neutral:  filtered.filter(t => hasCategory(t, 'neutral')),
  };

  let candidates = [];
  const rand = Math.random();

  if (rand < 0.4) {
    if (isDark && groups.dark.length > 0) candidates = groups.dark;
    else if (isLight && groups.light.length > 0) candidates = groups.light;
    else if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
  } else if (rand < 0.7) {
    if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
    else if (groups.neutral.length > 0) candidates = groups.neutral;
  }

  if (candidates.length === 0) candidates = filtered;

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function getRandomTextColors(imgData, tpl) {
  const { lum } = imgData;
  const rand = Math.random();

  if (rand < 0.3) {
    return { tc: tpl.tc, sc: tpl.sc };
  }

  if (lum < 80) {
    const darkColors = ["#ffffff", "#FFD700", "#FF6B9D", "#00F0FF"];
    return {
      tc: darkColors[Math.floor(Math.random() * darkColors.length)],
      sc: "#ffffffaa"
    };
  } else if (lum > 200) {
    const lightColors = ["#1a1a1a", "#D4A843", "#FF4D94", "#2DBE6C", "#4a90d9"];
    return {
      tc: lightColors[Math.floor(Math.random() * lightColors.length)],
      sc: "#444444"
    };
  }

  const allColors = TEXT_COLORS.map(c => c.value);
  const shuffled = shuffleArray(allColors);
  return { tc: shuffled[0], sc: shuffled[1] || shuffled[0] };
}

    fid: titleFont.id,

    fidSub: subFont.id,
    fidLoc: locFont.id,
    fidD1: descFont.id
  };
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const merged = { ...DEFAULT_STATE, ...parsed };
    if (merged.tags && merged.tags.length > 0 && typeof merged.tags[0] === "string") {
      merged.tags = merged.tags.map((t, i) => ({ id: `migrated_${i}`, text: t }));
    }
    return merged;
  } catch { return null; }
}

}

// 错误边界
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, errorInfo) {
    console.error('ErrorBoundary 捕获到错误:', error, errorInfo);
  }

  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          padding: 20, background: "#2a1a1a", border: "1px solid #ff4444",
          borderRadius: 8, margin: 20, color: "#fff"
        }}>
          <h3>出错了</h3>
          <p>{this.state.error?.message || '未知错误'}</p>
          <button onClick={() => window.location.reload()} style={{
            padding: "8px 16px", background: "#FF2442", border: "none",
            borderRadius: 6, color: "#fff", cursor: "pointer"
          }}>刷新页面</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// 拖拽组件 - 使用 memo 优化
const DraggableText = memo(function DraggableText({ id, off, children, style = {} }) {
  const onDrag = useContext(DragContext);
  const position = off?.[id] || { x: 0, y: 0 };
  const dragState = useRef({ isDragging: false, startX: 0, startY: 0, offsetX: 0, offsetY: 0 });

  const startDrag = useCallback((clientX, clientY) => {
    const state = dragState.current;
    state.isDragging = true;
    state.startX = clientX;
    state.startY = clientY;
    state.offsetX = position.x;
    state.offsetY = position.y;
  }, [position.x, position.y]);

  const onMouseDown = useCallback(e => {
    e.stopPropagation();
    startDrag(e.clientX, e.clientY);
    const mv = ev => { 
      if (!dragState.current.isDragging) return; 
      const state = dragState.current;
      onDrag(id, { 
        x: Math.round(state.offsetX + (ev.clientX - state.startX) / SCALE), 
        y: Math.round(state.offsetY + (ev.clientY - state.startY) / SCALE) 
      }); 
    };
    const up = () => { 
      dragState.current.isDragging = false; 
      window.removeEventListener("mousemove", mv); 
      window.removeEventListener("mouseup", up); 
    };
    window.addEventListener("mousemove", mv); 
    window.addEventListener("mouseup", up);
  }, [id, startDrag, onDrag]);

  const onTouchStart = useCallback(e => {
    e.stopPropagation();
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY);
    const mv = ev => { 
      if (!dragState.current.isDragging) return; 
      const state = dragState.current;
      const t = ev.touches[0];
      onDrag(id, { 
        x: Math.round(state.offsetX + (t.clientX - state.startX) / SCALE), 
        y: Math.round(state.offsetY + (t.clientY - state.startY) / SCALE) 
      }); 
    };
    const up = () => { 
      dragState.current.isDragging = false; 
      window.removeEventListener("touchmove", mv); 
      window.removeEventListener("touchend", up); 
    };
    window.addEventListener("touchmove", mv, { passive: false });
    window.addEventListener("touchend", up);
  }, [id, startDrag, onDrag]);

  const divStyle = useMemo(() => ({
    ...style,
    transform: `translate(${position.x}px,${position.y}px)`,
    cursor: "move",
    position: "relative",
    userSelect: "none",
    touchAction: "none"
  }), [style, position.x, position.y]);

  return <div onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={divStyle}>{children}</div>;
});

                      {sh("✂️", "裁剪与位移")}
                      <SL label="缩放" value={s.bgS} onChange={v => u("bgS", v)} min={80} max={200} ac={template.ac} unit="%" />
                      <SL label="水平位移" value={s.bgX} onChange={v => u("bgX", v)} min={0} max={100} ac={template.ac} unit="%" />
                      <SL label="垂直位移" value={s.bgY} onChange={v => u("bgY", v)} min={0} max={100} ac={template.ac} unit="%" />
                    </div>
                  </>}
                  {template.pure && <div style={{ marginTop: 12, padding: "10px", background: "#1a1a18", borderRadius: 8, fontSize: 11, color: "#887744" }}>📌 纯文字模版不使用背景图</div>}
                </>}

                {tab === "tags" && <>
                  {sh("🏷", "标签管理")}
                  {s.tags.map((tag, i) => (
                    <div key={tag.id} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                      <input value={tag.text} onChange={e => {
                        const updated = s.tags.map((t, j) => j === i ? { ...t, text: e.target.value } : t);
                        u("tags", updated);
                      }} style={{ ...INPUT_STYLE, flex: 1 }} />
                      <button onClick={() => u("tags", s.tags.filter((_, j) => j !== i))} style={{ width: 30, height: 34, background: "#1e1218", border: "1px solid #3a2028", borderRadius: 6, color: "#ff6666", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>
                    </div>
                  ))}
                  {s.tags.length < 6 && <button onClick={() => u("tags", [...s.tags, { id: `t${Date.now()}`, text: "#新标签" }])} style={{ width: "100%", padding: "8px", background: "transparent", border: "1.5px dashed #26263a", borderRadius: 8, color: "#555", cursor: "pointer", fontSize: 12 }}>+ 添加标签</button>}
                </>}
              </div>
            </aside>
          </div>
        </div>
        {showHannah && (
          <HannahModal onClose={() => setShowHannah(false)} />
        )}
      </DragContext.Provider>
    </ErrorBoundary>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
