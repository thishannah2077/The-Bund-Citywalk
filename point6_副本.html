<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>档案六 · 点位6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #e8d5b7; overflow-x: hidden; }
        .container { max-width: 414px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; }
        .archive-header { text-align: center; padding: 30px 0 20px; }
        .archive-number { font-size: 14px; color: #8b7355; letter-spacing: 3px; margin-bottom: 10px; opacity: 0; animation: fadeIn 0.8s ease forwards; }
        .archive-title { font-size: 28px; font-weight: bold; color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); margin-bottom: 8px; opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards; }
        .archive-year { font-size: 36px; font-weight: bold; color: #c9a961; letter-spacing: 5px; opacity: 0; animation: fadeIn 0.8s ease 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .divider { width: 60%; height: 1px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 20px auto; opacity: 0; animation: fadeIn 0.8s ease 0.9s forwards; }
        .story-section { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 25px 20px; margin: 20px 0; border: 1px solid rgba(212, 175, 55, 0.2); position: relative; opacity: 0; animation: fadeIn 0.8s ease 1.2s forwards; }
        .story-section::before { content: '【档案编号：点位6】'; position: absolute; top: -12px; left: 20px; background: #1a1a2e; padding: 0 10px; font-size: 12px; color: #d4af37; letter-spacing: 1px; }
        .story-text { font-size: 15px; line-height: 2; text-align: justify; color: #c9b896; min-height: 200px; }
        .typewriter-cursor { display: inline-block; width: 2px; height: 1em; background: #d4af37; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: text-bottom; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .question-section { margin: 30px 0; opacity: 0; animation: fadeIn 0.8s ease 1.5s forwards; }
        .question-title { font-size: 18px; color: #d4af37; text-align: center; margin-bottom: 25px; font-weight: 500; }
        .option-card { background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(15, 52, 96, 0.3) 100%); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; padding: 0; margin-bottom: 20px; cursor: pointer; transition: all 0.4s ease; opacity: 0; transform: translateX(-30px); }
        .option-card.show { opacity: 1; transform: translateX(0); }
        .option-card:hover { transform: translateY(-5px) scale(1.02); border-color: #d4af37; box-shadow: 0 12px 35px rgba(212, 175, 55, 0.25); }
        .option-header-bar { display: flex; align-items: center; padding: 15px 18px; background: rgba(212, 175, 55, 0.08); border-bottom: 1px solid rgba(212, 175, 55, 0.15); }
        .option-label { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: linear-gradient(135deg, #d4af37, #c9a961); border-radius: 10px; font-weight: bold; color: #1a1a2e; font-size: 18px; margin-right: 12px; }
        .option-title { font-size: 15px; color: #e8d5b7; font-weight: 600; flex: 1; }
        .option-arrow { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: #d4af37; opacity: 0.6; transition: all 0.3s ease; }
        .option-card:hover .option-arrow { opacity: 1; transform: translateX(5px); }
        .option-body { padding: 15px 18px; }
        .option-desc { font-size: 13px; color: #9a8b7a; line-height: 1.8; text-align: justify; }
        .back-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #d4af37; font-size: 20px; cursor: pointer; transition: all 0.3s ease; z-index: 100; }
        .back-btn:hover { background: rgba(212, 175, 55, 0.3); transform: scale(1.1); }
        .footer { text-align: center; padding: 30px 0; color: #5a4a3a; font-size: 12px; opacity: 0; animation: fadeIn 0.8s ease 2.5s forwards; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: -1; }
        .particle { position: absolute; width: 2px; height: 2px; background: #d4af37; border-radius: 50%; opacity: 0.3; animation: float 15s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
        .loading-overlay.hide { opacity: 0; pointer-events: none; }
        .loading-text { color: #d4af37; font-size: 16px; letter-spacing: 3px; }
        .back-to-map-btn { display: block; width: 80%; max-width: 280px; margin: 30px auto; padding: 14px 30px; background: transparent; border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 25px; font-size: 14px; color: #d4af37; cursor: pointer; transition: all 0.3s ease; text-align: center; opacity: 0; animation: fadeIn 0.8s ease 2.8s forwards; }
        .back-to-map-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; transform: translateY(-2px); }

        /* 提示按钮 */
        .hint-btn { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #d4af37; font-size: 18px; cursor: pointer; transition: all 0.3s ease; z-index: 100; }
        .hint-btn:hover { background: rgba(212, 175, 55, 0.3); transform: scale(1.1); }

        /* 提示弹窗 */
        .hint-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .hint-overlay.show { display: flex; }
        .hint-content { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 25px; max-width: 350px; width: 100%; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .hint-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .hint-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #d4af37, #c9a961); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .hint-title { font-size: 18px; font-weight: bold; color: #d4af37; }
        .hint-text { font-size: 14px; color: #c9b896; line-height: 1.8; margin-bottom: 20px; }
        .hint-close-btn { background: linear-gradient(135deg, #d4af37, #c9a961); border: none; border-radius: 20px; padding: 12px 30px; font-size: 14px; font-weight: bold; color: #1a1a2e; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .hint-close-btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-text">档案解密中...</div></div>
    <div class="particles" id="particles"></div>
    
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="hint-btn" onclick="showHint()">💡</div>

    <div class="hint-overlay" id="hintOverlay">
        <div class="hint-content">
            <div class="hint-header">
                <div class="hint-icon">💡</div>
                <div class="hint-title">探索提示</div>
            </div>
            <div class="hint-text" id="hintText">【提示内容待填】</div>
            <button class="hint-close-btn" onclick="hideHint()">知道了</button>
        </div>
    </div>
    
    <div class="container">
        <div class="archive-header">
            <div class="archive-number">档案六 · 点位6</div>
            <div class="archive-title">【标题待填】</div>
            <div class="archive-year">【年份】</div>
        </div>
        <div class="divider"></div>
        <div class="story-section">
            <div class="story-text" id="storyText"></div>
        </div>
        <div class="question-section">
            <div class="question-title">【问题待填】</div>
            <div class="option-card" id="optionA" onclick="goToDetail('A')">
                <div class="option-header-bar">
                    <span class="option-label">A</span>
                    <div class="option-title">【选项A标题待填】</div>
                    <div class="option-arrow">→</div>
                </div>
                <div class="option-body">
                    <div class="option-desc">【选项A描述待填】</div>
                </div>
            </div>
            <div class="option-card" id="optionB" onclick="goToDetail('B')">
                <div class="option-header-bar">
                    <span class="option-label">B</span>
                    <div class="option-title">【选项B标题待填】</div>
                    <div class="option-arrow">→</div>
                </div>
                <div class="option-body">
                    <div class="option-desc">【选项B描述待填】</div>
                </div>
            </div>
            <div class="option-card" id="optionC" onclick="goToDetail('C')">
                <div class="option-header-bar">
                    <span class="option-label">C</span>
                    <div class="option-title">【选项C标题待填】</div>
                    <div class="option-arrow">→</div>
                </div>
                <div class="option-body">
                    <div class="option-desc">【选项C描述待填】</div>
                </div>
            </div>
        </div>
        <button class="back-to-map-btn" onclick="goToMap()">← 返回地图</button>
        <div class="footer">档案六 · 点位6</div>
    </div>

    <script>
        const storyContent = `【故事内容待填】

【故事内容待填】

【故事内容待填】`;

        let charIndex = 0;
        let currentText = '';
        const storyElement = document.getElementById('storyText');
        let isTyping = true;
        let typingTimeout = null;

        function typeWriter() {
            if (charIndex < storyContent.length) {
                const char = storyContent.charAt(charIndex);
                if (char === '\n') {
                    currentText += '<br>';
                } else {
                    currentText += char;
                }
                storyElement.innerHTML = currentText + '<span class="typewriter-cursor"></span>';
                charIndex++;
                const delay = char === '。' || char === '，' ? 150 : 50;
                typingTimeout = setTimeout(typeWriter, delay);
            } else {
                storyElement.innerHTML = currentText;
                isTyping = false;
                showOptions();
            }
        }

        function skipTypewriter() {
            if (isTyping && charIndex < storyContent.length) {
                clearTimeout(typingTimeout);
                currentText = storyContent.replace(/\n/g, '<br>');
                storyElement.innerHTML = currentText;
                charIndex = storyContent.length;
                isTyping = false;
                showOptions();
            }
        }

        document.addEventListener('click', function(e) {
            if (isTyping && !e.target.closest('.back-btn') && !e.target.closest('.option-card') && !e.target.closest('.hint-btn')) {
                skipTypewriter();
            }
        });

        function showOptions() {
            ['optionA', 'optionB', 'optionC'].forEach((id, index) => {
                setTimeout(() => { document.getElementById(id).classList.add('show'); }, index * 200);
            });
        }

        function goToDetail(option) {
            window.location.href = `point6-detail.html?option=${option}`;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function goToMap() {
            window.location.href = 'index.html';
        }

        // 提示功能
        const hintContent = `【提示内容待填】

【提示内容待填】`;

        function showHint() {
            document.getElementById('hintText').innerText = hintContent;
            document.getElementById('hintOverlay').classList.add('show');
        }

        function hideHint() {
            document.getElementById('hintOverlay').classList.remove('show');
        }

        document.getElementById('hintOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                hideHint();
            }
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        window.onload = function() {
            createParticles();
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hide');
                setTimeout(typeWriter, 500);
            }, 800);
        };
    </script>
</body>
</html>
