function analyzeBg(src, cb) {
  const im = new Image();
  if (src && !src.startsWith("data:")) im.crossOrigin = "anonymous";
  im.onload = () => {
    const c = document.createElement("canvas"); c.width = 50; c.height = 50;
    const x = c.getContext("2d"); x.drawImage(im, 0, 0, 50, 50);
    const d = x.getImageData(0, 0, 50, 50).data;
    let t = 0, r = 0, g = 0, b = 0;
    for (let i = 0; i < d.length; i += 4) {
      t += d[i] * .299 + d[i + 1] * .587 + d[i + 2] * .114;
      r += d[i]; g += d[i + 1]; b += d[i + 2];
    }
    const count = d.length / 4;
    cb({
      lum: t / count,
      avgR: r / count,
      avgG: g / count,
      avgB: b / count,
      hue: rgbToHue(r / count, g / count, b / count)
    });
  }; im.src = src;
}

function rgbToHue(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0;
  if (max === min) return 0;
  if (max === r) h = (g - b) / (max - min);
  else if (max === g) h = 2 + (b - r) / (max - min);
  else h = 4 + (r - g) / (max - min);
  h *= 60;
  if (h < 0) h += 360;
  return h;
}

const autoTC = l => l > 128 ? "#1a1a1a" : "#ffffff";
const autoSC = l => l > 128 ? "#555" : "#ffffffbb";

function getRandomTemplate(imgData) {
  const { lum, hue } = imgData;
  const isDark = lum < 100;
  const isLight = lum > 180;
  const isWarm = hue >= 0 && hue < 60 || hue >= 300;
  const isCool = hue >= 120 && hue < 270;

  let filtered = T.filter(tpl => {
    if (tpl.pure && isLight) return false;
    return true;
  });

  if (filtered.length === 0) filtered = T;

  const groups = {
    dark: filtered.filter(t => t.id.includes('dark') || t.id.includes('black') || t.id.includes('navy') || t.id.includes('film')),
    light: filtered.filter(t => t.id.includes('clean') || t.id.includes('cream') || t.id.includes('soft') || t.id.includes('morandi') || t.id.includes('white')),
    warm: filtered.filter(t => t.id.includes('festival') || t.id.includes('gold') || t.id.includes('film') || t.id.includes('pink')),
    cool: filtered.filter(t => t.id.includes('cyber') || t.id.includes('neon') || t.id.includes('navy') || t.id.includes('holo')),
    neutral: filtered.filter(t => t.id.includes('editorial') || t.id.includes('poster') || t.id.includes('glass') || t.id.includes('cream')),
    vertical: filtered.filter(t => t.id.includes('vertical'))
  };

  let candidates = [];
  const rand = Math.random();

  if (rand < 0.4) {
    if (isDark && groups.dark.length > 0) candidates = groups.dark;
    else if (isLight && groups.light.length > 0) candidates = groups.light;
    else if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
  } else if (rand < 0.7) {
    if (isWarm && groups.warm.length > 0) candidates = groups.warm;
    else if (isCool && groups.cool.length > 0) candidates = groups.cool;
    else if (groups.neutral.length > 0) candidates = groups.neutral;
  } else if (rand < 0.85 && groups.vertical.length > 0) {
    candidates = groups.vertical;
  }

  if (candidates.length === 0) candidates = filtered;

  return candidates[Math.floor(Math.random() * candidates.length)];
}

function getRandomTextColors(imgData, tpl) {
  const { lum } = imgData;
  const rand = Math.random();

  if (rand < 0.3) {
    return { tc: tpl.tc, sc: tpl.sc };
  }

  if (lum < 80) {
    const darkColors = ["#ffffff", "#FFD700", "#FF6B9D", "#00F0FF"];
    return {
      tc: darkColors[Math.floor(Math.random() * darkColors.length)],
      sc: "#ffffffaa"
    };
  } else if (lum > 200) {
    const lightColors = ["#1a1a1a", "#D4A843", "#FF4D94", "#2DBE6C", "#4a90d9"];
    return {
      tc: lightColors[Math.floor(Math.random() * lightColors.length)],
      sc: "#444444"
    };
  }

  const allColors = TEXT_COLORS.map(c => c.value);
  const shuffled = allColors.sort(() => Math.random() - 0.5);
  return { tc: shuffled[0], sc: shuffled[1] || shuffled[0] };
}

function getRandomFontCombination() {
  const cnFonts = FONTS.filter(f => f.type === "cn");
  const enFonts = FONTS.filter(f => f.type === "en");

  const titleFont = cnFonts[Math.floor(Math.random() * cnFonts.length)];
  const subFont = Math.random() > 0.5 ? enFonts[Math.floor(Math.random() * enFonts.length)] : titleFont;
  const locFont = cnFonts[Math.floor(Math.random() * cnFonts.length)];
  const descFont = cnFonts[Math.floor(Math.random() * cnFonts.length)];

  return {
    fid: titleFont.id,
    fidTitle: titleFont.id,
    fidSub: subFont.id,
    fidLoc: locFont.id,
    fidD1: descFont.id
  };
}

}

function applySmartRandom(state, imgData) {
  const tpl = getRandomTemplate(imgData);
  const colors = getRandomTextColors(imgData, tpl);
  const fonts = getRandomFontCombination();
  const layout = getRandomLayoutParams();

  const filterStyles = [
    { hue: 0, blur: 0, bright: 100, contrast: 100, sat: 100 },
    { hue: Math.floor(Math.random() * 30) - 15, blur: 0, bright: 110, contrast: 110, sat: 120 },

    { hue: 0, blur: 0, bright: 115, contrast: 120, sat: 80 }
  ];
  const filters = filterStyles[Math.floor(Math.random() * filterStyles.length)];

  return {
    ...state,
    tid: tpl.id,
    customTc: colors.tc,
    customSc: colors.sc,

    auto: true,

}

function DraggableText({ id, off, children, style = {} }) {
  const onDrag = useContext(DragCtx);
  const o = off?.[id] || { x: 0, y: 0 };
  const r = useRef({ on: false, sx: 0, sy: 0, ox: 0, oy: 0 });

  const startDrag = useCallback((clientX, clientY) => {
    const d = r.current; d.on = true; d.sx = clientX; d.sy = clientY; d.ox = o.x; d.oy = o.y;
  }, [o.x, o.y]);

  const onMouseDown = useCallback(e => {
    e.stopPropagation();
    startDrag(e.clientX, e.clientY);
    const mv = ev => { if (!r.current.on) return; const d = r.current; onDrag(id, { x: Math.round(d.ox + (ev.clientX - d.sx) / SC), y: Math.round(d.oy + (ev.clientY - d.sy) / SC) }); };
    const up = () => { r.current.on = false; window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", mv); window.addEventListener("mouseup", up);
  }, [id, startDrag, onDrag]);

  const onTouchStart = useCallback(e => {
    e.stopPropagation();
    const touch = e.touches[0];
    startDrag(touch.clientX, touch.clientY);
    const mv = ev => { if (!r.current.on) return; const d = r.current; const t = ev.touches[0]; onDrag(id, { x: Math.round(d.ox + (t.clientX - d.sx) / SC), y: Math.round(d.oy + (t.clientY - d.sy) / SC) }); };
    const up = () => { r.current.on = false; window.removeEventListener("touchmove", mv); window.removeEventListener("touchend", up); };
    window.addEventListener("touchmove", mv, { passive: false });
    window.addEventListener("touchend", up);
  }, [id, startDrag, onDrag]);

  return <div onMouseDown={onMouseDown} onTouchStart={onTouchStart} style={{ ...style, transform: `translate(${o.x}px,${o.y}px)`, cursor: "move", position: "relative", userSelect: "none", touchAction: "none" }}>{children}</div>;
}

function Cover({ s, innerRef }) {
  const t = T.find(x => x.id === s.tid) || T[0];
  const ff = (FONTS.find(f => f.id === s.fid) || FONTS[0]).family;
  const ffTitle = (FONTS.find(f => f.id === s.fidTitle) || FONTS[0]).family;
  const ffSub = (FONTS.find(f => f.id === s.fidSub) || FONTS[0]).family;
  const ffLoc = (FONTS.find(f => f.id === s.fidLoc) || FONTS[0]).family;
  const ffD1 = (FONTS.find(f => f.id === s.fidD1) || FONTS[0]).family;

const HANNAH_PARTICLES = ["👑","✨","💅","🌟","💫","🎀","💎","🌸"];

function HannahModal({ onClose }) {
  const [closing, setClosing] = useState(false);
  const [progress, setProgress] = useState(100);
  const [particles, setParticles] = useState([]);

  const close = useCallback(() => {
    setClosing(true);
    setTimeout(onClose, 280);
  }, [onClose]);

  // countdown
  useEffect(() => {
    const total = 4000;
    const start = Date.now();
    const timer = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 100 - (elapsed / total) * 100);
      setProgress(pct);
      if (elapsed >= total) { clearInterval(timer); close(); }
    }, 50);
    return () => clearInterval(timer);
  }, [close]);

  // spawn particles
  useEffect(() => {
    const spawn = () => setParticles(prev => {
      const next = [...prev, {
        id: Date.now() + Math.random(),
        emoji: HANNAH_PARTICLES[Math.floor(Math.random() * HANNAH_PARTICLES.length)],
        left: 10 + Math.random() * 80,
        delay: Math.random() * 0.4,
        duration: 1.4 + Math.random() * 0.8,
      }];
      return next.slice(-16);
    });
    const t = setInterval(spawn, 220);
    return () => clearInterval(t);
  }, []);

  return (
    <div onClick={close} style={{ position:"fixed", inset:0, zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
      background:"rgba(0,0,0,0.72)", backdropFilter:"blur(4px)" }}>
      {/* floating particles */}
      {particles.map(p => (
        <span key={p.id} className="sparkle-particle" style={{ left:`${p.left}%`, bottom:"15%", animationDelay:`${p.delay}s`, animationDuration:`${p.duration}s` }}>{p.emoji}</span>
      ))}

      <div className={`hannah-card${closing?" out":""}`} onClick={e=>e.stopPropagation()}
        style={{ background:"linear-gradient(135deg,#1a1020,#120818,#0d1020)", border:"1px solid #c4a0d455",
          borderRadius:20, padding:"40px 48px 32px", textAlign:"center", maxWidth:360, position:"relative", overflow:"visible",
          boxShadow:"0 32px 80px #0009, 0 0 60px #c4a0d420" }}>

        {/* glowing halo */}
        <div style={{ position:"absolute", top:-30, left:"50%", transform:"translateX(-50%)", width:80, height:80,
          borderRadius:"50%", background:"radial-gradient(#FFD70055,transparent 70%)", pointerEvents:"none" }} />

        <div className="crown" style={{ fontSize:52, marginBottom:8, display:"block" }}>👑</div>

        <div style={{ fontSize:11, color:"#c4a0d4aa", letterSpacing:4, textTransform:"uppercase", marginBottom:16 }}>
          A Message from the Universe
        </div>

        <div style={{ fontFamily:"'Noto Serif SC',serif", fontSize:22, fontWeight:700, lineHeight:1.5,
          background:"linear-gradient(135deg,#FFD700,#FF9A3C,#FF6B9D)", WebkitBackgroundClip:"text",
          WebkitTextFillColor:"transparent", marginBottom:12 }}>
          感谢伟大的造物主
        </div>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:32, fontWeight:900, letterSpacing:6,
          background:"linear-gradient(90deg,#FFD700,#fff8e0,#FFD700)", WebkitBackgroundClip:"text",
          WebkitTextFillColor:"transparent", animation:"shimmer 1.5s ease-in-out infinite", marginBottom:16 }}>
          汉  娜
        </div>

        <div style={{ width:"60%", height:1, background:"linear-gradient(90deg,transparent,#c4a0d455,transparent)", margin:"0 auto 20px" }} />

        <div style={{ fontSize:13, color:"#c4a0d4cc", lineHeight:1.8, marginBottom:8 }}>
          此封面经由汉娜女神亲手赐福 ✨<br/>
          <span style={{ fontSize:11, color:"#8878a0" }}>愿你的每一篇笔记都爆款</span>
        </div>

        <div style={{ fontSize:10, color:"#55447766", marginTop:4, marginBottom:20, fontStyle:"italic" }}>
          — 系统自动发现了一位造物主 —
        </div>

        {/* progress bar */}
        <div style={{ width:"100%", height:2, background:"#ffffff11", borderRadius:1, overflow:"hidden" }}>
          <div style={{ height:"100%", background:"linear-gradient(90deg,#c4a0d4,#FFD700)", borderRadius:1,
            width:`${progress}%`, transition:"width .05s linear" }} />
        </div>
        <div style={{ marginTop:8, fontSize:10, color:"#44334466" }}>点击任意处关闭</div>
      </div>
    </div>
  );
}

const STORAGE_KEY = "xhs_cover_draft_v1";

function loadDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // 合并默认值，防止旧草稿缺少新字段
    return { ...DEF, ...parsed };
  } catch { return null; }
}

function saveDraft(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function App() {
  const [state, setState] = useState(() => loadDraft() || DEF);

  const tpl = T.find(x => x.id === state.tid) || T[0];

  const s = state, u = update, exp = isExporting;

  // 自动保存草稿（防抖 800ms）
  useEffect(() => {
    const timer = setTimeout(() => {
      saveDraft(state);
      setDraftSaved(true);
      setTimeout(() => setDraftSaved(false), 1500);
    }, 800);
    return () => clearTimeout(timer);
  }, [state]);

  // 预加载 dom-to-image-more
  useEffect(() => {
    import("https://cdn.jsdelivr.net/npm/dom-to-image-more@3.1.6/+esm")
      .then(m => { domToImageRef.current = m.default || m; })
      .catch(() => {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/dom-to-image-more@3.1.6/dist/dom-to-image-more.min.js";
        script.onload = () => { domToImageRef.current = window.domtoimage; };
        document.head.appendChild(script);
      });
  }, []);

  const handleImg = e => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const src = ev.target.result;
      u("img", src);
      analyzeBg(src, data => {
        setState(p => ({ ...p, lum: data.lum }));
      });
    };
    r.readAsDataURL(f);
  };

  const handleSmartRandom = useCallback(() => {
    if (!s.img) {
      alert("请先上传图片");
      return;
    }
    analyzeBg(s.img, data => {
      setState(p => applySmartRandom(p, data));
    });
  }, [s.img]);

  const handleDrag = useCallback((id, pos) => setState(p => ({ ...p, off: { ...p.off, [id]: pos } })), []);

  const handleResizeStart = useCallback(() => setIsResizing(true), []);
  const handleResizeEnd = useCallback(() => setIsResizing(false), []);
  const handleResize = useCallback((e) => {
    if (!isResizing) return;
    const container = document.getElementById("main-container");
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const newWidth = Math.max(280, Math.min(e.clientX - rect.left, window.innerWidth - 400));
    setPreviewWidth(newWidth);
  }, [isResizing]);

  useEffect(() => {
    if (isResizing) {
      document.addEventListener("mousemove", handleResize);
      document.addEventListener("mouseup", handleResizeEnd);
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
    }
    return () => {
      document.removeEventListener("mousemove", handleResize);
      document.removeEventListener("mouseup", handleResizeEnd);
      document.body.style.cursor = "";

      let domtoimage = domToImageRef.current;
      if (!domtoimage) {
        await new Promise((resolve, reject) => {
          let retries = 0;
          const check = () => {
            if (domToImageRef.current) { domtoimage = domToImageRef.current; resolve(); }
            else if (retries++ < 20) setTimeout(check, 200);
            else reject(new Error("导出库加载超时"));
          };
          check();
        });
      }

      await new Promise(r => setTimeout(r, 100));

      const blob = await domtoimage.toBlob(targetEl, {
        width: 540, height: 720, quality: 1, scale: 2,
        style: { position: "relative", transform: "none" }

                      style={{ flex: 1, padding: "7px", background: "#1e1218", border: "1px solid #3a2028", borderRadius: 6, color: "#ff6666", cursor: "pointer", fontSize: 12 }}>移除</button>
                  </div>
                  <div style={{ marginTop: 14 }}>
                    {sh("✂️", "裁剪与位移")}
                    <SL l="缩放" v={s.bgS} o={v => u("bgS", v)} mn={80} mx={200} ac={tpl.ac} u="%" />
                    <SL l="水平位移" v={s.bgX} o={v => u("bgX", v)} mn={0} mx={100} ac={tpl.ac} u="%" />
                    <SL l="垂直位移" v={s.bgY} o={v => u("bgY", v)} mn={0} mx={100} ac={tpl.ac} u="%" />
                  </div>
                </>}
                {tpl.pure && <div style={{ marginTop: 12, padding: "10px", background: "#1a1a18", borderRadius: 8, fontSize: 11, color: "#887744" }}>📌 纯文字模版不使用背景图</div>}
              </>}

              {tab === "tags" && <>
                {sh("🏷", "标签管理")}
                {s.tags.map((tag, i) => (
                  <div key={`${tag}-${i}`} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                    <input value={tag} onChange={e => { const t = [...s.tags]; t[i] = e.target.value; u("tags", t); }} style={{ ...IS, flex: 1 }} />
                    <button onClick={() => u("tags", s.tags.filter((_, j) => j !== i))} style={{ width: 30, height: 34, background: "#1e1218", border: "1px solid #3a2028", borderRadius: 6, color: "#ff6666", cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>
                  </div>
                ))}
                {s.tags.length < 6 && <button onClick={() => u("tags", [...s.tags, "#新标签"])} style={{ width: "100%", padding: "8px", background: "transparent", border: "1.5px dashed #26263a", borderRadius: 8, color: "#555", cursor: "pointer", fontSize: 12 }}>+ 添加标签</button>}
              </>}
            </div>
          </aside>
        </div>
      </div>
      {showHannah && (
        <HannahModal onClose={() => setShowHannah(false)} />
      )}
    </DragCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
