<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>档案六 · 点位一 - 详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: #f5f0e1;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            min-height: 100vh;
            color: #3d2b1f;
            overflow-x: hidden;
        }

        .container {
            max-width: 414px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            background: linear-gradient(180deg, 
                rgba(245, 240, 225, 0.95) 0%, 
                rgba(235, 225, 200, 0.95) 50%,
                rgba(225, 215, 190, 0.95) 100%);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(139, 69, 19, 0.2);
            border: 2px solid #8b4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5c4033;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(139, 69, 19, 0.3);
            transform: scale(1.1);
        }

        /* 提示按钮 */
        .hint-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(139, 69, 19, 0.2);
            border: 2px solid #8b4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5c4033;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .hint-btn:hover {
            background: rgba(139, 69, 19, 0.3);
            transform: scale(1.1);
        }

        /* 提示弹窗 */
        .hint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 43, 31, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .hint-overlay.show {
            display: flex;
        }

        .hint-content {
            background: linear-gradient(180deg, #f5f0e1 0%, #e8dcc8 100%);
            border: 3px solid #8b4513;
            border-radius: 4px;
            padding: 25px;
            max-width: 350px;
            width: 100%;
            animation: modalIn 0.3s ease;
            position: relative;
        }

        .hint-content::before {
            content: '提示';
            position: absolute;
            top: -10px;
            left: 20px;
            background: #f5f0e1;
            padding: 0 10px;
            font-size: 11px;
            color: #8b0000;
            border: 1px solid #8b0000;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .hint-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .hint-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid #d4a574;
        }

        .hint-title {
            font-size: 18px;
            font-weight: bold;
            color: #8b0000;
            letter-spacing: 2px;
        }

        .hint-text {
            font-size: 14px;
            color: #3d2b1f;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .hint-close-btn {
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            border: 2px solid #d4a574;
            border-radius: 4px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            color: #f5f0e1;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 2px;
        }

        .hint-close-btn:hover {
            transform: scale(1.02);
        }

        .archive-header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }

        .archive-number {
            font-size: 14px;
            color: #5c4033;
            letter-spacing: 3px;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        .archive-title {
            font-size: 24px;
            font-weight: bold;
            color: #8b0000;
            letter-spacing: 2px;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.3s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b4513, transparent);
            margin: 20px auto;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.6s forwards;
        }

        .option-content {
            display: none;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.9s forwards;
        }

        .option-content.active {
            display: block;
        }

        .stem-section {
            background: rgba(139, 69, 19, 0.05);
            border-radius: 4px;
            padding: 25px 20px;
            margin: 20px 0;
            border: 2px solid #8b4513;
            position: relative;
        }

        .stem-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: #f5f0e1;
            padding: 0 10px;
            font-size: 12px;
            color: #8b0000;
            letter-spacing: 1px;
            border: 1px solid #8b0000;
        }

        .stem-text {
            font-size: 15px;
            line-height: 2;
            text-align: justify;
            color: #3d2b1f;
        }

        .questions-section {
            margin: 30px 0;
        }

        .question-item {
            background: rgba(139, 69, 19, 0.05);
            border: 2px solid #8b4513;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f5f0e1;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 14px;
            line-height: 1.8;
            color: #3d2b1f;
        }

        .answer-section {
            margin: 30px 0;
            text-align: center;
        }

        .answer-label {
            font-size: 14px;
            color: #8b0000;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .answer-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .answer-input {
            width: 50px;
            height: 50px;
            background: rgba(139, 69, 19, 0.05);
            border: 2px solid #8b4513;
            border-radius: 4px;
            text-align: center;
            font-size: 24px;
            color: #8b0000;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
        }

        .answer-input:focus {
            outline: none;
            border-color: #8b0000;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.2);
        }

        .submit-btn {
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            border: 2px solid #d4a574;
            border-radius: 4px;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            color: #f5f0e1;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4);
        }

        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .result-message.show {
            opacity: 1;
        }

        .result-message.correct {
            background: rgba(34, 139, 34, 0.1);
            border: 2px solid #228b22;
            color: #228b22;
        }

        .result-message.wrong {
            background: rgba(139, 0, 0, 0.1);
            border: 2px solid #8b0000;
            color: #8b0000;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #5c4033;
            font-size: 12px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #8b4513;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f0e1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: #5c4033;
            font-size: 16px;
            letter-spacing: 3px;
        }

        .detail-section {
            background: rgba(139, 69, 19, 0.05);
            border-radius: 4px;
            padding: 25px 20px;
            margin: 20px 0;
            border: 2px solid #228b22;
            position: relative;
            display: none;
        }

        .detail-section.show {
            display: block;
            animation: fadeIn 0.8s ease forwards;
        }

        .detail-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: #f5f0e1;
            padding: 0 10px;
            font-size: 12px;
            color: #228b22;
            letter-spacing: 1px;
            border: 1px solid #228b22;
        }

        .detail-text {
            font-size: 15px;
            line-height: 2;
            text-align: justify;
            color: #3d2b1f;
        }

        .detail-text .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #228b22;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
        }

        .back-to-map-btn {
            display: block;
            width: 80%;
            max-width: 280px;
            margin: 30px auto;
            padding: 14px 30px;
            background: transparent;
            border: 2px solid #8b4513;
            border-radius: 4px;
            font-size: 14px;
            color: #5c4033;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 2px;
        }

        .back-to-map-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">档案解密中...</div>
    </div>

    <div class="particles" id="particles"></div>
    
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="hint-btn" onclick="showHint()">💡</div>

    <!-- 提示弹窗 -->
    <div class="hint-overlay" id="hintOverlay">
        <div class="hint-content">
            <div class="hint-header">
                <div class="hint-icon">💡</div>
                <div class="hint-title">答题提示</div>
            </div>
            <div class="hint-text" id="hintText">【提示内容待填】</div>
            <button class="hint-close-btn" onclick="hideHint()">知道了</button>
        </div>
    </div>
    
    <div class="container">
        <div class="archive-header">
            <div class="archive-number">档案六 · 点位一</div>
            <div class="archive-title">【详情标题待填】</div>
        </div>

        <div class="divider"></div>

        <div id="optionA" class="option-content">
            <div class="stem-section">
                <div class="stem-label">题干</div>
                <div class="stem-text" id="stemTextA">【题干内容待填】</div>
            </div>

            <div class="questions-section">
                <div class="question-item">
                    <span class="question-number">第一问</span>
                    <div class="question-text" id="questionText1">【问题1待填】</div>
                </div>
                <div class="question-item">
                    <span class="question-number">第二问</span>
                    <div class="question-text" id="questionText2">【问题2待填】</div>
                </div>
                <div class="question-item">
                    <span class="question-number">第三问</span>
                    <div class="question-text" id="questionText3">【问题3待填】</div>
                </div>
                <div class="question-item">
                    <span class="question-number">第四问</span>
                    <div class="question-text" id="questionText4">【问题4待填】</div>
                </div>
            </div>

            <div class="answer-section">
                <div class="answer-label">请输入四个数字答案</div>
                <div class="answer-input-group">
                    <input type="text" class="answer-input" id="input1" maxlength="1" oninput="moveToNext(this, 'input2')">
                    <input type="text" class="answer-input" id="input2" maxlength="1" oninput="moveToNext(this, 'input3')">
                    <input type="text" class="answer-input" id="input3" maxlength="1" oninput="moveToNext(this, 'input4')">
                    <input type="text" class="answer-input" id="input4" maxlength="1">
                </div>
                <button class="submit-btn" onclick="checkAnswerA()">确认答案</button>
                <div class="result-message" id="resultA"></div>
            </div>

            <div class="detail-section" id="detailA">
                <div class="detail-label">档案详情</div>
                <div class="detail-text" id="detailTextA"></div>
            </div>

            <button class="back-to-map-btn" onclick="goToMap()">← 返回地图</button>
        </div>

        <div id="optionB" class="option-content">
            <div class="stem-section">
                <div class="stem-label">题干</div>
                <div class="stem-text" id="stemTextB">【题干内容待填】</div>
            </div>

            <div class="questions-section">
                <div class="question-item">
                    <span class="question-number">第一问</span>
                    <div class="question-text">【问题待填】</div>
                </div>
            </div>

            <div class="answer-section">
                <div class="answer-label">请输入答案</div>
                <div class="answer-input-group">
                    <input type="text" class="answer-input" id="inputB1" maxlength="1">
                </div>
                <button class="submit-btn" onclick="checkAnswerB()">确认答案</button>
                <div class="result-message" id="resultB"></div>
            </div>

            <div class="detail-section" id="detailB">
                <div class="detail-label">档案详情</div>
                <div class="detail-text" id="detailTextB"></div>
            </div>

            <button class="back-to-map-btn" onclick="goToMap()">← 返回地图</button>
        </div>

        <div id="optionC" class="option-content">
            <div class="stem-section">
                <div class="stem-label">题干</div>
                <div class="stem-text" id="stemTextC">【题干内容待填】</div>
            </div>

            <div class="questions-section">
                <div class="question-item">
                    <span class="question-number">第一问</span>
                    <div class="question-text">【问题待填】</div>
                </div>
            </div>

            <div class="answer-section">
                <div class="answer-label">请输入答案</div>
                <div class="answer-input-group">
                    <input type="text" class="answer-input" id="inputC1" maxlength="1">
                </div>
                <button class="submit-btn" onclick="checkAnswerC()">确认答案</button>
                <div class="result-message" id="resultC"></div>
            </div>

            <div class="detail-section" id="detailC">
                <div class="detail-label">档案详情</div>
                <div class="detail-text" id="detailTextC"></div>
            </div>

            <button class="back-to-map-btn" onclick="goToMap()">← 返回地图</button>
        </div>

        <div class="footer">
            档案六 · 点位一
        </div>
    </div>

    <script>
        const optionData = {
            A: {
                stem: '【题干内容待填】',
                questions: ['【问题1待填】', '【问题2待填】', '【问题3待填】', '【问题4待填】'],
                answer: '1234',
                detail: '【详情内容待填】\n\n【详情内容待填】\n\n【详情内容待填】'
            },
            B: {
                stem: '【题干内容待填】',
                questions: ['【问题待填】'],
                answer: '1',
                detail: '【详情内容待填】\n\n【详情内容待填】'
            },
            C: {
                stem: '【题干内容待填】',
                questions: ['【问题待填】'],
                answer: '1',
                detail: '【详情内容待填】\n\n【详情内容待填】'
            }
        };

        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                const nextInput = document.getElementById(nextId);
                if (nextInput) {
                    nextInput.focus();
                }
            }
        }

        function typeWriterDetail(elementId, text) {
            const element = document.getElementById(elementId);
            let charIndex = 0;
            let currentText = '';
            
            function type() {
                if (charIndex < text.length) {
                    const char = text.charAt(charIndex);
                    currentText += char === '\n' ? '<br>' : char;
                    element.innerHTML = currentText + '<span class="typewriter-cursor"></span>';
                    charIndex++;
                    setTimeout(type, char === '。' || char === '，' ? 150 : 50);
                } else {
                    element.innerHTML = currentText;
                }
            }
            type();
        }

        function checkAnswerA() {
            const inputs = ['input1', 'input2', 'input3', 'input4'];
            let userAnswer = '';
            inputs.forEach(id => {
                userAnswer += document.getElementById(id).value;
            });
            
            const resultEl = document.getElementById('resultA');
            
            if (userAnswer.length !== 4) {
                resultEl.textContent = '请输入完整的四位答案';
                resultEl.className = 'result-message show wrong';
                return;
            }
            
            if (userAnswer === optionData.A.answer) {
                resultEl.textContent = '✓ 回答正确！';
                resultEl.className = 'result-message show correct';
                document.getElementById('detailA').classList.add('show');
                typeWriterDetail('detailTextA', optionData.A.detail);
            } else {
                resultEl.textContent = '✗ 答案不正确，请重新思考';
                resultEl.className = 'result-message show wrong';
            }
        }

        function checkAnswerB() {
            const userAnswer = document.getElementById('inputB1').value;
            const resultEl = document.getElementById('resultB');
            
            if (userAnswer === optionData.B.answer) {
                resultEl.textContent = '✓ 回答正确！';
                resultEl.className = 'result-message show correct';
                document.getElementById('detailB').classList.add('show');
                typeWriterDetail('detailTextB', optionData.B.detail);
            } else {
                resultEl.textContent = '✗ 答案不正确，请重新思考';
                resultEl.className = 'result-message show wrong';
            }
        }

        function checkAnswerC() {
            const userAnswer = document.getElementById('inputC1').value;
            const resultEl = document.getElementById('resultC');
            
            if (userAnswer === optionData.C.answer) {
                resultEl.textContent = '✓ 回答正确！';
                resultEl.className = 'result-message show correct';
                document.getElementById('detailC').classList.add('show');
                typeWriterDetail('detailTextC', optionData.C.detail);
            } else {
                resultEl.textContent = '✗ 答案不正确，请重新思考';
                resultEl.className = 'result-message show wrong';
            }
        }

        function goBack() {
            window.location.href = 'point1.html';
        }

        function goToMap() {
            window.location.href = 'index.html';
        }

        // 提示功能
        const hintContent = `【提示内容待填】

【提示内容待填】`;

        function showHint() {
            document.getElementById('hintText').innerText = hintContent;
            document.getElementById('hintOverlay').classList.add('show');
        }

        function hideHint() {
            document.getElementById('hintOverlay').classList.remove('show');
        }

        document.getElementById('hintOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                hideHint();
            }
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        window.onload = function() {
            createParticles();
            
            const urlParams = new URLSearchParams(window.location.search);
            const option = urlParams.get('option') || 'A';
            
            document.getElementById(`option${option}`).classList.add('active');
            
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hide');
            }, 800);
        };
    </script>
</body>
</html>
