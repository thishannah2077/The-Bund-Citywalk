<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书封面生成器 - 最小测试</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;
    
    // 简单的标签组件
    const Tg = ({ t, bc, tc }) => (
      <span style={{ border: `1.5px solid ${bc}`, borderRadius: 4, padding: "3px 12px", color: tc, fontSize: 13, fontWeight: 500 }}>
        {t}
      </span>
    );
    
    // 测试组件
    function TestApp() {
      const [tags, setTags] = useState([
        { id: 1, text: "标签1" },
        { id: 2, text: "标签2" },
        { id: 3, text: "标签3" }
      ]);
      
      return (
        <div className="container">
          <h1>React JSX 测试</h1>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {tags.map(tag => (
              <Tg key={tag.id} t={tag.text} bc="#ccc" tc="#333" />
            ))}
          </div>
          <button onClick={() => setTags([...tags, { id: Date.now(), text: "新标签" }])}>
            添加标签
          </button>
        </div>
      );
    }
    
    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestApp />);
  </script>
</body>
</html>
